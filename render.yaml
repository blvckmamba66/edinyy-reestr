services:
  - type: web
    name: edinyy-reestr
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_LOGIN
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      # API-ключ SMS.ru для реальной отправки SMS. Задайте значение в дашборде Render
      # (Environment). Если оставить пустым — работает демо-режим (код показывается на экране).
      - key: SMSRU_API_ID
        sync: false
